services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    environment:
      FLOWCORE_REDIS_URL: redis://redis:6379/0
      FLOWCORE_QUEUE_NAME: flowcore
    depends_on:
      - redis
    command: ["sleep", "infinity"]

  worker:
    build: .
    environment:
      FLOWCORE_REDIS_URL: redis://redis:6379/0
      FLOWCORE_QUEUE_NAME: flowcore
    depends_on:
      - redis
    command:
      [
        "flowcore",
        "worker",
        "--redis-url",
        "redis://redis:6379/0",
        "--queue-name",
        "flowcore",
        "--concurrency",
        "1",
        "--metrics-port",
        "9000"
      ]
    ports:
      - "9000:9000"
